name: Full Plugin Release Pipeline

on:
  push:
    branches:
      - main
      - master

env:
  PLUGIN_SLUG: calendly-bookings
  PLUGIN_MAIN_FILE: calendly-bookings.php
  CONSTANTS_FILE: includes/constants.php
  VERSION_FILE: version.txt
  DEPLOY_TO_WPORG: 'true'

jobs:
  bump_version:
    name: Bump semantic version
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.bump.outputs.new_version }}
      new_tag: ${{ steps.bump.outputs.new_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read current version
        id: read
        run: |
          current=$(cat ${{ env.VERSION_FILE }} 2>/dev/null || echo "0.0.0")
          current=$(echo "$current" | tr -d '\n\r')
          echo "current=$current" >> $GITHUB_OUTPUT

      - name: Determine bump type
        id: bump_type
        run: |
          commits=$(git log -1 --pretty=%B)
          bump="patch"
          if echo "$commits" | grep -q "BREAKING CHANGE"; then
            bump="major"
          elif echo "$commits" | grep -Eiq "^feat(\(|:)" ; then
            bump="minor"
          elif echo "$commits" | grep -Eiq "^fix(\(|:)" ; then
            bump="patch"
          fi
          echo "bump=$bump" >> $GITHUB_OUTPUT

      - name: Increment version
        id: bump
        run: |
          base="${{ steps.read.outputs.current }}"
          IFS='.' read -r major minor patch <<< "$base"
          [ -z "$major" ] && major=0
          [ -z "$minor" ] && minor=0
          [ -z "$patch" ] && patch=0

          bump="${{ steps.bump_type.outputs.bump }}"
          if [ "$bump" = "major" ]; then
            major=$((major + 1)); minor=0; patch=0
          elif [ "$bump" = "minor" ]; then
            minor=$((minor + 1)); patch=0
          else
            patch=$((patch + 1))
          fi

          new_version="${major}.${minor}.${patch}"
          new_tag="v${new_version}"

          echo "new_version=$new_version" >> $GITHUB_OUTPUT
          echo "new_tag=$new_tag" >> $GITHUB_OUTPUT

  update_sources:
    name: Update source files
    needs: bump_version
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ needs.bump_version.outputs.new_version }}
      new_tag: ${{ needs.bump_version.outputs.new_tag }}

    steps:
      - name: Checkout with write access
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Rewrite version lines
        env:
          NEW_VERSION: ${{ needs.bump_version.outputs.new_version }}
          PLUGIN_MAIN_FILE: ${{ env.PLUGIN_MAIN_FILE }}
          CONSTANTS_FILE: ${{ env.CONSTANTS_FILE }}
          VERSION_FILE: ${{ env.VERSION_FILE }}
        run: php scripts/update.php

      - name: Commit changes
        env:
          NEW_VERSION: ${{ needs.bump_version.outputs.new_version }}
        run: |
          git config user.name "Wafiq Harris-Ashby"
          git config user.email "whashby@gmail.com"
          git add "${PLUGIN_MAIN_FILE}" "${CONSTANTS_FILE}" readme.txt "${VERSION_FILE}" || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore(release): v${NEW_VERSION}"
            git push origin HEAD
          fi

      - name: Tag release
        env:
          NEW_TAG: ${{ needs.bump_version.outputs.new_tag }}
        run: |
          git tag "${NEW_TAG}"
          git push origin "${NEW_TAG}"

  build_and_release:
    name: Build ZIP & Release
    needs: update_sources
    runs-on: ubuntu-latest

    steps:
      - name: Checkout with tags
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare plugin folder
        env:
          PLUGIN_SLUG: ${{ env.PLUGIN_SLUG }}
        run: |
          mkdir -p build/${PLUGIN_SLUG}
          rsync -av \
            --exclude="build" \
            --exclude=".git" \
            --exclude=".github" \
            --exclude=".gitignore" \
            ./ build/${PLUGIN_SLUG}/

      - name: Create ZIP (only php, html, js, css)
        env:
          PLUGIN_SLUG: ${{ env.PLUGIN_SLUG }}
        run: |
          cd build/${PLUGIN_SLUG}
          zip -r "../${PLUGIN_SLUG}.zip" . \
            -i '*.php' '*.html' '*.js' '*.css'

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.update_sources.outputs.new_tag }}
          name: Release ${{ needs.update_sources.outputs.new_tag }}
          generate_release_notes: true
          files: "build/${{ env.PLUGIN_SLUG }}.zip"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy_wordpress_org:
    name: Deploy to WordPress.org
    needs: build_and_release
    runs-on: ubuntu-latest
    if: ${{ github.env.DEPLOY_TO_WPORG == 'true' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Deploy to WordPress.org
        uses: 10up/action-wordpress-plugin-deploy@v2
        with:
          slug: ${{ env.PLUGIN_SLUG }}
          version: ${{ needs.update_sources.outputs.new_version }}
        env:
          SVN_USERNAME: ${{ secrets.WPORG_SVN_USERNAME }}
          SVN_PASSWORD: ${{ secrets.WPORG_SVN_PASSWORD }}
