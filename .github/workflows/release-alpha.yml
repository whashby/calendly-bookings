name: Alpha Release Pipeline

on:
  push:
    branches:
      - develop

env:
  PLUGIN_SLUG: calendly-bookings
  MAIN_FILE: calendly-bookings.php
  VERSION_FILE: version.txt

jobs:
  release-alpha:
    name: Release Alpha Version
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Read current version
        id: read_version
        run: |
          current=$(cat ${{ env.VERSION_FILE }} | tr -d '[:space:]')
          echo "version=$current" >> $GITHUB_OUTPUT

      - name: Create alpha tag
        id: tag_alpha
        run: |
          alpha_tag="v${{ steps.read_version.outputs.version }}-alpha"
          echo "tag=$alpha_tag" >> $GITHUB_OUTPUT

      - name: Create release artifacts
        run: |
          mkdir -p release
          zip -r release/${{ env.PLUGIN_SLUG }}-${{ steps.tag_alpha.outputs.tag }}.zip . -x "*.git*" ".github/*"

      - name: Create Git tag
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag ${{ steps.tag_alpha.outputs.tag }}
          git push origin ${{ steps.tag_alpha.outputs.tag }}

      - name: Bump version
        id: bump_version
        run: |
          current=${{ steps.read_version.outputs.version }}
          IFS='.' read -r major minor patch <<< "$current"
          patch=$((patch + 1))
          new_version="$major.$minor.$patch"
          echo "$new_version" > ${{ env.VERSION_FILE }}
          sed -i "s/^ \* Version: .*/ * Version: $new_version/" ${{ env.MAIN_FILE }}
          echo "new_version=$new_version" >> $GITHUB_OUTPUT

      - name: Commit bumped version
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add ${{ env.VERSION_FILE }} ${{ env.MAIN_FILE }}
          git commit -m "Bump version to ${{ steps.bump_version.outputs.new_version }}"
          git push origin develop